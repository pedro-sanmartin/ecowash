<div class="background__auth">
  <div class="container">
    <div class="card-contrasena">
      <h1>Cambiar contraseña</h1>
      <form
        class="card-contrasena__form"
        [formGroup]="form"
        (ngSubmit)="cambiarContrasena()"
      >
        <div>
          <div class="bs-container-input">
            <label>Ingresa nueva contraseña</label>
            <input
              class="bs-input"
              type="password"
              formControlName="password"
              placeholder="*******"
            />
            <div
              *ngIf="password.invalid && password.touched"
              class="bs-container__error"
            >
              <p class="bs-input-error-message text-white">
                <i-feather class="icon__error" name="alert-triangle"></i-feather
                >Debe ingresar una contraseña
              </p>
            </div>
          </div>

          <div class="bs-container-input">
            <label>Confirmar nueva contraseña</label>
            <input
              class="bs-input"
              type="password"
              formControlName="repitePassword"
              placeholder="*******"
            />

            <div *ngIf="repitePasswordNoValido" class="bs-container__error">
              <p class="bs-input-error-message text-white">
                <i-feather class="icon__error" name="alert-triangle"></i-feather
                >Las contraseñas deben ser iguales
              </p>
            </div>
          </div>
        </div>
        <div class="card-contrasena__button">
          <button class="bs-button bs-button-secondary">
            Cambiar contraseña
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
