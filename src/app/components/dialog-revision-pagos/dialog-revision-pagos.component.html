<form class="bs-form-dialog dialog_usuarios__form" [formGroup]="form" (ngSubmit)="filtrar()">
    <div class="bs-container-input">
        <div class="divNomLoc">
            <div class="input__icon w-50">
                <label class="mb-10">Fecha</label>
                <select class="bs-input-border mt-5" formControlName="meses">
            <option value="">Mes</option>
            <option *ngFor="let item of listaMeses" [value]="item.id">
              {{ item.nombre }}
            </option>
          </select>
            </div>
            <div class="input__icon w-50">
                <label>Año</label>
                <select class="bs-input-border mt-5" formControlName="annio">
              <option value="">Año</option>
              <option *ngFor="let item of listaAnnios" [value]="item.id">{{ item.nombre }}</option>
            </select>
            </div>
        </div>

        <div class="input__icon">
            <label>Sucursal</label>
            <select class="bs-input-border mt-5" formControlName="idLocal">
          <option value="">Seleccione</option>
          <option *ngFor="let item of listaLocales" [value]="item.id">
            {{ item.nombre }}
          </option>
        </select>
        </div>


        <div class="bs-container-input-dialog">
            <label>Tipo de Abono</label>
            <div class="container__radio">
                <div class="input__radio">
                    <input class="custom-control-input" id="abonoSemanal" type="radio" name="tipoAbono" value="1" formControlName="tipoAbono" />
                    <label class="custom-control-label" for="abonoSemanal">Abono semana</label>
                </div>
                <div class="input__radio">
                    <input class="custom-control-input" id="garantia" type="radio" name="tipoAbono" value="2" formControlName="tipoAbono" />
                    <label class="custom-control-label" for="garantia">Garantia</label>
                </div>
            </div>
        </div>


        <div class="bs-container-input">
            <label>Estado</label>
            <div class="container__radio">
                <div class="input__radio">
                    <input class="custom-control-input" id="status_evaluacion" type="radio" name="idEstado" value="1" formControlName="idEstado" />
                    <label class="custom-control-label" for="status_evaluacion">En evaluación</label>
                </div>
                <div class="input__radio">
                    <input class="custom-control-input" id="status_aprobado" type="radio" name="idEstado" value="2" formControlName="idEstado" />
                    <label class="custom-control-label" for="status_aprobado">Aceptado</label>
                </div>
            </div>
            <div class="container__radio">
                <div class="input__radio">
                    <input class="custom-control-input" id="status_rechazado" type="radio" name="idEstado" value="3" formControlName="idEstado" />
                    <label class="custom-control-label" for="status_rechazado">Rechazado</label>
                </div>
            </div>
        </div>

        <button class="bs-button bs-button-primary">
        Filtrar
        </button>
    </div>
</form>
<button class="bs-button bs-button-primary" style="width:100%;" (click)="limpiarFiltros()">
    Limpiar Filtros
  </button>
