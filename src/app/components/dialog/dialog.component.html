<form class="bs-form-dialog dialog__form">
  <div class="bs-container-input">
    <div class="divNomLoc">
        <div class="input__icon w-50">
          <label class="mb-10">Fecha</label>
          <select
            class="bs-input-border mt-5"
            formControlName="meses"
            >
            <option value="">Mes</option>
            <option *ngFor="let item of listaMeses" [value]="item.id">
              {{ item.nombre }}
            </option>
          </select>
        </div>
        <div class="input__icon w-50">
            <label>&nbsp;</label>
            <select
              class="bs-input-border mt-5"
              formControlName="año"
              >
              <option value="">Año</option>
              <option>2020</option>
              <option>2021</option>
              <option>2022</option>
            </select>
          </div>
    </div>

    <div class="input__icon">
        <label>Local</label>
        <select
          class="bs-input-border mt-5"
          formControlName="idLocal"
          >
          <option value="">Seleccione</option>
          <option *ngFor="let item of listaLocales" [value]="item.id">
            {{ item.nombre }}
          </option>
        </select>
      </div>

      <div class="input__icon mt-10">
        <label>Tipo de Abono</label>
        <div class="filaRadioButton">
            <div><input class="bs-input-radio"  type="radio" name="tipoAbono" value="abonoSemana"><label for="abonoSemana">Abono semana</label></div>
            <div><input class="bs-input-radio" type="radio" name="tipoAbono" value="garantia"><label for="garantia">Garantia</label></div>           
        </div>
      </div>

      <div class="input__icon">
        <label>Estado</label>
        <div class="filaRadioButton">
            <div><input class="bs-input-radio" type="radio" name="estado" value="enEvaluacion"><label for="enEvaluacion">En evaluación</label></div>
            <div><input class="bs-input-radio" type="radio" name="estado" value="aceptado"><label for="aceptado">Aceptado</label></div>           
        </div>
        <div class="mt-5">
            <input class="bs-input-radio" type="radio" name="estado" value="rechazado"><label for="rechazado">Rechazado</label>
        </div>
      </div>

      <button class="bs-button bs-button-primary mt-10" (click)="filtrar()">
        Filtrar
      </button>
  </div>
</form>
