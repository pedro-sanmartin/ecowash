<app-header [options]="headerOptions"></app-header>
<app-submenu [submenu]="submenu"></app-submenu>

<div class="container">
    <form class="pagar__form bs-form">
        <div class="bs-form__actions mb-5">
            <button class="bs-button bs-button-primary" (click)="openDialog()">
              Filtrar
          </button>
        </div>
        <p class="bs-parrafo-bottom-modal mb-25"></p>
        <app-sin-datos *ngIf="pagos.length == 0" [message]="message"></app-sin-datos>
        <app-card-locales-pendientes *ngFor="let pago of pagos" [pago]="pago"></app-card-locales-pendientes>
    </form>
</div>
