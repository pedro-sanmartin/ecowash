<app-header [options]="headerOptions"></app-header>
<app-submenu [submenu]="submenu"></app-submenu>
<div class="container">
  <div class="container__main">
    <app-sin-datos
      *ngIf="servicios.length == 0"
      [message]="message"
    ></app-sin-datos>
    <app-card-servicios
      *ngFor="let servicio of servicios"
      [servicio]="servicio"
    ></app-card-servicios>
  </div>
</div>
<app-footer [textButton]="textButton" [urlButton]="urlButton"></app-footer>
